<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicializando</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/png" href="img/icone-192.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .splash-logo {
      width: 180px;
      max-width: 70vw;
      height: auto;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <img src="img/splash.png" alt="Logo do aplicativo" class="splash-logo">
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "index.html"
    }, 2000)
  </script>
</body>
</html>
