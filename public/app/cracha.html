<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habilitação</title>
  <link rel="stylesheet" href="css/app.css">

  <style>
    .topo-cracha {
      position: relative;
      align-items: flex-start;
      padding: 18px 22px 0;
    }

    .btn-voltar-cracha {
      margin-top: 14px;
      margin-right: 10px;
    }

    .topo-cracha-bloco {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding-top: 10px;
      min-width: 0;
    }

    .topo-cracha-titulo {
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }

    .topo-cracha-texto {
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
    }

    @media (max-width: 390px) {
      .topo-cracha-titulo {
        font-size: 14px;
      }

      .topo-cracha-texto {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="app-screen tela-cracha">

    <div class="topo-cracha">
      <button class="btn-voltar-cracha" type="button" onclick="window.location.href='info.html'" aria-label="Voltar">
        ←
      </button>

      <div class="topo-cracha-bloco">
        <div class="topo-cracha-titulo">HABILITAÇÃO</div>
        <div class="topo-cracha-texto">
          Atualizado em: <span id="dataAtualizacao">06/02/2026 - 00:38:39</span>
        </div>
      </div>
    </div>

    <div class="cracha-scroll">

      <div class="cracha-conteudo">
        <p class="cracha-instrucao">Verifique autenticidade do QR Code com o app Vio</p>

        <div class="cracha-slider" id="crachaSlider">
          <div class="cracha-track" id="crachaTrack">

            <div class="cracha-slide">
              <img id="imgCracha1" src="img/cracha-1.png" alt="Crachá frente">
            </div>

            <div class="cracha-slide">
              <img id="imgCracha2" src="img/cracha-2.png" alt="Crachá verso">
            </div>

            <div class="cracha-slide">
              <img id="imgCracha3" src="img/cracha-3.png" alt="Crachá dados">
            </div>

            <div class="cracha-slide">
              <img id="imgCracha4" src="img/cracha-4.png" alt="Crachá QR Code">
            </div>

          </div>
        </div>

        <div class="cracha-indicadores">
          <span class="cracha-dot ativo"></span>
          <span class="cracha-dot"></span>
          <span class="cracha-dot"></span>
          <span class="cracha-dot"></span>
        </div>

        <div class="cracha-botoes">
          <button class="cracha-botao" type="button" onclick="clicarCrachaBotao(1)">
            <img src="img/cracha-botao-1.png" alt="Botão 1">
          </button>

          <button class="cracha-botao" type="button" onclick="clicarCrachaBotao(2)">
            <img src="img/cracha-botao-2.png" alt="Botão 2">
          </button>

          <button class="cracha-botao" type="button" onclick="clicarCrachaBotao(3)">
            <img src="img/cracha-botao-3.png" alt="Botão 3">
          </button>

          <button class="cracha-botao" type="button" onclick="clicarCrachaBotao(4)">
            <img src="img/cracha-botao-4.png" alt="Botão 4">
          </button>
        </div>

      </div>

    </div>

  </div>

  <script>
    const slider = document.getElementById("crachaSlider")
    const dots = document.querySelectorAll(".cracha-dot")
    const dataAtualizacao = document.getElementById("dataAtualizacao")

    function limparSessaoApp() {
      localStorage.removeItem("appLogado")
      localStorage.removeItem("dadosUsuarioApp")
      localStorage.removeItem("inicialApp")
      localStorage.removeItem("cpfApp")
    }

    function obterSessaoApp() {
      try {
        const appLogado = localStorage.getItem("appLogado")
        const dadosUsuarioApp = JSON.parse(localStorage.getItem("dadosUsuarioApp") || "null")

        if (appLogado !== "true") return null
        if (!dadosUsuarioApp || typeof dadosUsuarioApp !== "object") return null
        if (!dadosUsuarioApp.id || !dadosUsuarioApp.cpf) return null

        return dadosUsuarioApp
      } catch (error) {
        return null
      }
    }

    async function validarCadastroNoServidor(id) {
      try {
        const res = await fetch("/api/app/validacao/" + encodeURIComponent(id))
        if (!res.ok) return null
        return await res.json()
      } catch (error) {
        return null
      }
    }

    async function iniciarCracha() {
      const dadosUsuarioApp = obterSessaoApp()

      if (!dadosUsuarioApp) {
        limparSessaoApp()
        window.location.href = "login-cpf.html"
        return
      }

      const cadastroServidor = await validarCadastroNoServidor(dadosUsuarioApp.id)

      if (!cadastroServidor || cadastroServidor.erro) {
        limparSessaoApp()
        alert("Seu cadastro foi removido, expirou ou não está mais disponível.")
        window.location.href = "login-cpf.html"
        return
      }

      const dadosAtualizados = {
        ...dadosUsuarioApp,
        nome: cadastroServidor.nomeCompleto || dadosUsuarioApp.nome || "",
        nomeCivil: cadastroServidor.nomeCompleto || dadosUsuarioApp.nomeCivil || "",
        cpf: cadastroServidor.cpf || dadosUsuarioApp.cpf || "",
        categoria: cadastroServidor.categoria || dadosUsuarioApp.categoria || "",
        validade: cadastroServidor.validade || dadosUsuarioApp.validade || "",
        numeroDocumento: cadastroServidor.numeroDocumento || dadosUsuarioApp.numeroDocumento || "",
        orgaoEmissor: cadastroServidor.orgaoEmissor || dadosUsuarioApp.orgaoEmissor || "",
        ufEmissao: cadastroServidor.ufEmissao || dadosUsuarioApp.ufEmissao || "",
        dataNascimento: cadastroServidor.dataNascimento || dadosUsuarioApp.dataNascimento || "",
        nomePai: cadastroServidor.nomePai || dadosUsuarioApp.nomePai || "",
        nomeMae: cadastroServidor.nomeMae || dadosUsuarioApp.nomeMae || "",
        permissao: cadastroServidor.tipoDocumento || dadosUsuarioApp.permissao || "",
        acc: cadastroServidor.acc || dadosUsuarioApp.acc || "NÃO",
        numeroRegistro: cadastroServidor.numeroRegistro || dadosUsuarioApp.numeroRegistro || "",
        primeiraHabilitacao: cadastroServidor.primeiraHabilitacao || dadosUsuarioApp.primeiraHabilitacao || "",
        observacoes: cadastroServidor.observacoes || dadosUsuarioApp.observacoes || "",
        cidadeEmissao: cadastroServidor.cidadeEmissao || dadosUsuarioApp.cidadeEmissao || "",
        uf: cadastroServidor.ufEmissao || cadastroServidor.ufCnh || dadosUsuarioApp.uf || "",
        dataEmissao: cadastroServidor.dataEmissao || dadosUsuarioApp.dataEmissao || "",
        numeroValidacao: cadastroServidor.codigoSeguranca || dadosUsuarioApp.numeroValidacao || "",
        renach: cadastroServidor.renach || dadosUsuarioApp.renach || "",
        foto: cadastroServidor.fotoRosto || dadosUsuarioApp.foto || "img/foto-validacao.png"
      }

      localStorage.setItem("dadosUsuarioApp", JSON.stringify(dadosAtualizados))

      const imagens = Array.isArray(dadosUsuarioApp.imagensCracha)
        ? dadosUsuarioApp.imagensCracha
        : []

      if (imagens[0]) document.getElementById("imgCracha1").src = imagens[0]
      if (imagens[1]) document.getElementById("imgCracha2").src = imagens[1]
      if (imagens[2]) document.getElementById("imgCracha3").src = imagens[2]
      if (imagens[3]) document.getElementById("imgCracha4").src = imagens[3]
    }

    function atualizarDataTopo() {
      const agora = new Date()

      const dd = String(agora.getDate()).padStart(2, "0")
      const mm = String(agora.getMonth() + 1).padStart(2, "0")
      const yyyy = agora.getFullYear()

      const hh = String(agora.getHours()).padStart(2, "0")
      const mi = String(agora.getMinutes()).padStart(2, "0")
      const ss = String(agora.getSeconds()).padStart(2, "0")

      dataAtualizacao.innerText = `${dd}/${mm}/${yyyy} - ${hh}:${mi}:${ss}`
    }

    atualizarDataTopo()
    setInterval(atualizarDataTopo, 1000)

    function atualizarDots() {
      const slideWidth = slider.offsetWidth
      const index = Math.round(slider.scrollLeft / slideWidth)

      dots.forEach((dot, i) => {
        if (i === index) {
          dot.classList.add("ativo")
        } else {
          dot.classList.remove("ativo")
        }
      })
    }

    slider.addEventListener("scroll", atualizarDots)

    function clicarCrachaBotao(numero) {
      const dadosUsuarioApp = obterSessaoApp()

      if (numero === 2) {
        if (!dadosUsuarioApp || !dadosUsuarioApp.pdfCnh) {
          alert("PDF não disponível para este usuário")
          return
        }

        window.open(dadosUsuarioApp.pdfCnh, "_blank")
        return
      }

      return false
    }

    iniciarCracha()
  </script>

</body>
</html>
