<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digite sua senha</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <div class="app-screen tela-senha">

    <div class="topo-app">
      <button class="btn-voltar" onclick="window.location.href='login-cpf.html'">←</button>
      <div class="topo-titulo">DIGITE SUA SENHA</div>
    </div>

    <div class="senha-wrapper">

      <div class="senha-card">
        <h1 class="senha-titulo">Digite sua senha</h1>

        <div class="senha-bloco">
          <label class="senha-label">CPF</label>
          <div class="cpf-texto" id="cpfMostrado">000.000.000-00</div>
        </div>

        <div class="senha-bloco">
          <label class="senha-label" for="senhaInput">Senha</label>
          <input
            id="senhaInput"
            class="senha-input"
            type="password"
            placeholder="Digite sua senha atual"
            inputmode="numeric"
            maxlength="4"
          >
        </div>

        <button class="link-esqueceu" onclick="esqueciSenha()">
          Esqueci minha senha
        </button>

        <div class="botoes-senha">
          <button class="btn-cancelar" onclick="window.location.href='login-cpf.html'">
            Cancelar
          </button>

          <button class="btn-entrar-app" onclick="entrarSenha()">
            Entrar
          </button>
        </div>
      </div>

      <button class="link-duvidas" onclick="abrirDuvidas()">
        Ficou com dúvidas?
      </button>

    </div>

  </div>

  <script>
    function formatarCPF(cpf) {
      const numeros = String(cpf || "").replace(/\D/g, "").slice(0, 11)
      if (!numeros) return "000.000.000-00"

      let valor = numeros
      valor = valor.replace(/^(\d{3})(\d)/, "$1.$2")
      valor = valor.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
      valor = valor.replace(/\.(\d{3})(\d)/, ".$1-$2")
      return valor
    }

    function limparSessaoApp() {
      localStorage.removeItem("appLogado")
      localStorage.removeItem("dadosUsuarioApp")
      localStorage.removeItem("inicialApp")
    }

    const cpfSalvo = (localStorage.getItem("cpfApp") || "").replace(/\D/g, "")
    const cpfMostrado = document.getElementById("cpfMostrado")

    if (!cpfSalvo) {
      window.location.href = "login-cpf.html"
    }

    if (cpfMostrado) {
      cpfMostrado.innerText = formatarCPF(cpfSalvo)
    }

    function esqueciSenha() {
      alert("Entre em contato com o suporte para gerar um novo cadastro.")
    }

    function abrirDuvidas() {
      alert("Central de ajuda aqui")
    }

    async function entrarSenha() {
      const senha = document.getElementById("senhaInput").value.trim()
      const cpf = (localStorage.getItem("cpfApp") || "").replace(/\D/g, "")

      if (!cpf) {
        alert("CPF não encontrado. Volte e digite novamente.")
        window.location.href = "login-cpf.html"
        return
      }

      if (!senha) {
        alert("Digite sua senha")
        return
      }

      if (!/^\d{4}$/.test(senha)) {
        alert("A senha deve ter 4 números")
        return
      }

      try {
        limparSessaoApp()

        const res = await fetch("/api/app/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ cpf, senha })
        })

        const data = await res.json()

        if (!res.ok || !data.ok) {
          alert(data.erro || "Não foi possível entrar")
          return
        }

        const nome = data.nomeCompleto || ""
        const inicial = nome ? nome.trim().charAt(0).toUpperCase() : "U"

        localStorage.setItem("inicialApp", inicial)
        localStorage.setItem("appLogado", "true")
        localStorage.setItem("dadosUsuarioApp", JSON.stringify({
          id: data.id,
          nome: data.nomeCompleto || "",
          nomeCivil: data.nomeCompleto || "",
          cpf: data.cpf || "",
          sexo: data.sexo || "",
          categoria: data.categoria || "",
          validade: data.validade || "",
          urlValidacao: data.urlValidacao || "",
          imagensCracha: data.imagensCracha || [],
          numeroDocumento: data.numeroDocumento || "",
          orgaoEmissor: data.orgaoEmissor || "",
          ufEmissao: data.ufEmissao || "",
          dataNascimento: data.dataNascimento || "",
          nomePai: data.nomePai || "",
          nomeMae: data.nomeMae || "",
          permissao: data.tipoDocumento || "",
          acc: data.acc || "NÃO",
          numeroRegistro: data.numeroRegistro || "",
          primeiraHabilitacao: data.primeiraHabilitacao || "",
          observacoes: data.observacoes || "",
          cidadeEmissao: data.cidadeEmissao || "",
          uf: data.ufCnh || data.ufEmissao || "",
          dataEmissao: data.dataEmissao || "",
          numeroValidacao: data.codigoSeguranca || "",
          renach: data.renach || "",
          foto: data.fotoRosto || "img/foto-validacao.png",
          pdfCnh: data.pdfCnh || "",
          fotoAssinatura: data.fotoAssinatura || "",
          nacionalidade: data.nacionalidade || "",
          ufNascimento: data.ufNascimento || "",
          cidadeNascimento: data.cidadeNascimento || "",
          categoriasAdicionais: data.categoriasAdicionais || []
        }))

        window.location.href = "home.html"
      } catch (error) {
        console.error(error)
        alert("Erro ao conectar com o servidor")
      }
    }
  </script>

</body>
</html>
